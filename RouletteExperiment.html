<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Roulette Game</title>
  <!-- Primary and fallback CDN sources reduce the chance of a blank local launch if one provider is unreachable. -->
  <link rel="stylesheet" href="https://unpkg.com/jspsych@8.2.1/css/jspsych.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jspsych@8.2.1/css/jspsych.css">
  <script src="https://unpkg.com/jspsych@8.2.1"></script>
  <script>
    if (typeof window.initJsPsych !== "function" && window.jsPsychModule && typeof window.jsPsychModule.initJsPsych === "function") {
      window.initJsPsych = window.jsPsychModule.initJsPsych;
    }
    if (typeof window.initJsPsych !== "function") {
      document.write('<script src="https://cdn.jsdelivr.net/npm/jspsych@8.2.1"><\/script>');
    }
  </script>
  <script>
    if (typeof window.initJsPsych !== "function" && window.jsPsychModule && typeof window.jsPsychModule.initJsPsych === "function") {
      window.initJsPsych = window.jsPsychModule.initJsPsych;
    }
  </script>
  <style>
    :root {
      --bg: #f6f6f6;
      --text: #20242c;
      --muted: #6f7480;
      --panel: #ffffff;
      --line: #d9dde6;
      --accent: #2e5bff;
      --accent-soft: #eff3ff;
      --danger: #b3261e;
      --shadow: 0 18px 48px rgba(25, 32, 56, 0.10);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    #jspsych-target,
    .jspsych-content-wrapper,
    .jspsych-content {
      width: 100%;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      max-width: none;
      text-align: initial;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .page-shell {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background: var(--bg);
    }

    .center-panel {
      width: min(860px, calc(100vw - 48px));
      max-height: calc(100vh - 48px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 42px;
      text-align: center;
    }

    .center-panel.narrow {
      width: min(680px, calc(100vw - 48px));
    }

    .title {
      margin: 0 0 22px;
      font-size: 34px;
      line-height: 1.15;
      font-weight: 760;
      text-align: center;
    }

    .body-text {
      font-size: 20px;
      line-height: 1.5;
      margin: 0 auto 22px;
      max-width: 760px;
      color: #303541;
    }

    .primary-button,
    .fill-button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      min-height: 54px;
      padding: 15px 28px;
      border-radius: 12px;
      border: 2px solid var(--accent);
      background: #ffffff;
      color: var(--accent);
      font-weight: 760;
      overflow: hidden;
      transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
    }

    .primary-button:hover,
    .fill-button.ready:hover {
      background: var(--accent);
      color: #ffffff;
      box-shadow: 0 0 0 4px rgba(46, 91, 255, 0.12);
    }

    .fill-button[aria-disabled="true"] {
      border-color: #b9c2d8;
      color: #7b8498;
      cursor: default;
    }

    .fill-button .button-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      background: rgba(46, 91, 255, 0.16);
      pointer-events: none;
    }

    .fill-button .button-label {
      position: relative;
      z-index: 1;
    }

    .form-stack {
      display: grid;
      gap: 16px;
      margin: 28px auto;
      width: min(520px, 100%);
    }

    .text-input,
    .text-area {
      width: 100%;
      border: 2px solid #d9dde6;
      border-radius: 14px;
      background: #ffffff;
      padding: 16px 18px;
      font-size: 18px;
      color: var(--text);
      box-shadow: none;
      transition: border-color 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    .text-input:focus,
    .text-area:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(46, 91, 255, 0.12);
    }

    .text-area {
      min-height: 170px;
      resize: vertical;
      line-height: 1.45;
    }

    .validation-message,
    .feedback-message {
      min-height: 24px;
      margin: 12px 0 0;
      color: var(--danger);
      font-weight: 650;
      text-align: center;
    }

    .feedback-message.ok {
      color: #176b39;
    }

    .instruction-panel {
      width: min(980px, calc(100vw - 48px));
      height: min(850px, calc(100vh - 48px));
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .instruction-title {
      padding: 30px 38px 18px;
      border-bottom: 1px solid var(--line);
      font-size: 32px;
      line-height: 1.2;
      font-weight: 780;
      text-align: center;
    }

    .instruction-content {
      padding: 26px 42px;
      overflow: hidden;
    }

    .instruction-content.scrollable {
      overflow-y: auto;
    }

    .instruction-bottom {
      padding: 20px 38px 28px;
      border-top: 1px solid var(--line);
      text-align: center;
      background: #fbfbfc;
    }

    .instruction-block {
      margin: 0 0 18px;
      opacity: 1;
      transition: opacity 0.2s ease;
    }

    .instruction-block.dimmed {
      opacity: 0.48;
    }

    .instruction-block h3 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.25;
    }

    .instruction-block p,
    .plain-paragraph {
      margin: 0 0 12px;
      font-size: 19px;
      line-height: 1.55;
      color: #2e3440;
    }

    .consent-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-top: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfcff;
      font-size: 18px;
      line-height: 1.4;
    }

    .consent-row input {
      width: 22px;
      height: 22px;
      margin-top: 2px;
      accent-color: var(--accent);
    }

    .task-screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
    }

    .roulette-area {
      position: absolute;
      left: 43%;
      top: 50%;
      width: 430px;
      transform: translate(-50%, -50%);
    }

    .amount-strip {
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      font-size: 24px;
      font-weight: 800;
    }

    .amount-box {
      min-width: 116px;
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border: 2px solid #d4d9e5;
      border-radius: 12px;
      background: #ffffff;
    }

    .outcome-box {
      min-width: 132px;
      color: #111827;
    }

    .wheel-wrap {
      position: relative;
      width: 430px;
      height: 430px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #wheelCanvas {
      width: 420px;
      height: 420px;
      display: block;
    }

    .wheel-pointer {
      position: absolute;
      left: 50%;
      top: -2px;
      width: 0;
      height: 0;
      transform: translateX(-50%);
      border-left: 17px solid transparent;
      border-right: 17px solid transparent;
      border-top: 36px solid #232733;
      z-index: 4;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
    }

    .sampling-panel {
      position: absolute;
      right: 3vw;
      top: 7vh;
      width: min(420px, 31vw);
      min-width: 330px;
      height: 86vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 14px;
      padding: 22px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .sampling-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 780;
      text-align: center;
    }

    .sampling-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .key-box {
      position: relative;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #cdd3df;
      border-radius: 12px;
      background: #ffffff;
      font-size: 18px;
      font-weight: 760;
      overflow: hidden;
      color: #252b36;
    }

    .key-box.inactive {
      opacity: 0.45;
    }

    .key-box.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(46, 91, 255, 0.08);
    }

    .key-box .key-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      background: rgba(46, 91, 255, 0.18);
      z-index: 0;
      pointer-events: none;
    }

    .key-box span {
      position: relative;
      z-index: 1;
    }

    .sample-list {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-rows: repeat(20, 1fr);
      align-items: stretch;
      overflow: hidden;
      border: 2px solid #d7dce7;
      border-radius: 12px;
      background: #fbfbfd;
      padding: 10px 12px;
    }

    .sample-row {
      display: flex;
      align-items: center;
      min-height: 0;
      border-bottom: 1px solid rgba(210, 216, 228, 0.65);
      font-size: 17px;
      line-height: 1.1;
      font-weight: 650;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sample-row:last-child {
      border-bottom: 0;
    }

    .tutorial-panel {
      position: absolute;
      left: 3vw;
      top: 7vh;
      width: min(390px, 28vw);
      min-width: 310px;
      height: 86vh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
      padding: 22px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .tutorial-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 780;
      text-align: center;
    }

    .tutorial-text-list {
      overflow: hidden;
    }

    .tutorial-text {
      margin: 0 0 16px;
      font-size: 18px;
      line-height: 1.45;
      opacity: 1;
      transition: opacity 0.2s ease;
    }

    .tutorial-text.dimmed {
      opacity: 0.42;
    }

    .bottom-indicator {
      position: absolute;
      left: 43%;
      bottom: 26px;
      transform: translateX(-50%);
      min-width: 360px;
      text-align: center;
      color: var(--muted);
      font-weight: 720;
      font-size: 18px;
    }

    .dot-holder {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      width: 60px;
    }

    .dot-holder.static .dot {
      animation: none;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #1f2937;
      display: inline-block;
      animation-name: dotBounce;
      animation-duration: 1500ms;
      animation-iteration-count: 2;
      animation-timing-function: ease-in-out;
    }

    .dot:nth-child(2) {
      animation-delay: 160ms;
    }

    .dot:nth-child(3) {
      animation-delay: 320ms;
    }

    @keyframes dotBounce {
      0%, 70%, 100% { transform: translateY(0); opacity: 0.55; }
      28% { transform: translateY(-10px); opacity: 1; }
    }

    .overlay-card {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(520px, calc(100vw - 60px));
      padding: 32px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #ffffff;
      box-shadow: 0 24px 80px rgba(22, 28, 45, 0.18);
      text-align: center;
      z-index: 10;
      font-size: 22px;
      line-height: 1.45;
      font-weight: 720;
    }

    .choice-grid {
      display: grid;
      gap: 13px;
      margin: 26px auto 18px;
      width: min(720px, 100%);
    }

    .answer-option {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #d9dde6;
      border-radius: 16px;
      background: #ffffff;
      color: var(--text);
      text-align: left;
      font-size: 18px;
      transition: border-color 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    .answer-option.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: 0 0 0 4px rgba(46, 91, 255, 0.10);
    }

    .warning-box {
      width: min(760px, 100%);
      margin: 22px auto 0;
      padding: 18px 20px;
      border: 2px solid #e0a323;
      border-radius: 12px;
      background: #fff8e6;
      color: #5a3b00;
      font-weight: 760;
      line-height: 1.45;
    }

    .ladder-placeholder,
    .ladder-image {
      width: min(260px, 72vw);
      height: 330px;
      margin: 22px auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed #c6ccd8;
      border-radius: 12px;
      background: #fbfbfd;
      color: #6d7586;
      text-align: center;
      font-weight: 680;
    }

    .ladder-image {
      object-fit: contain;
      border-style: solid;
      background: #ffffff;
    }

    .number-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 20px auto;
    }

    .number-choice {
      width: 46px;
      height: 46px;
      border: 2px solid #d9dde6;
      border-radius: 999px;
      background: #ffffff;
      font-weight: 760;
      color: var(--text);
      transition: border-color 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    .number-choice.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: 0 0 0 4px rgba(46, 91, 255, 0.10);
      color: var(--accent);
    }

    .copy-code {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      border: 2px solid var(--accent);
      border-radius: 12px;
      background: #ffffff;
      color: var(--accent);
      font-weight: 840;
      user-select: all;
      cursor: pointer;
    }

    @media (max-width: 980px) {
      .roulette-area {
        left: 40%;
        width: 360px;
      }

      .wheel-wrap {
        width: 360px;
        height: 360px;
      }

      #wheelCanvas {
        width: 350px;
        height: 350px;
      }

      .sampling-panel {
        width: 330px;
        right: 1.5vw;
      }

      .tutorial-panel {
        width: 300px;
        left: 1.5vw;
      }
    }
  </style>
</head>

    window.addEventListener("error", (event) => {
      showVisibleStartupProblem("A startup error occurred. Please contact the researcher and mention that the page did not pass the launch check.");
      event.preventDefault();

    window.addEventListener("unhandledrejection", (event) => {

    const state = {
      seed: generateSeed(),
      rng: null,
      display: null,
      allRows: [],
      activeSection: null,
      participantFirstName: "",
      participantId: "",
      conditions: [],
      domainOrder: [],
      trialsByDomain: {},
      mainNameUsage: {},
      tutorialNameUsage: {},
      wheelAngle: -Math.PI / 2,
      currentKeyHandler: null,
      lastCompletedTrialByBlock: {},
      finalCompletionRow: null
    };

    state.rng = mulberry32(state.seed);

    function generateSeed() {
      if (window.crypto && window.crypto.getRandomValues) {
        const array = new Uint32Array(1);
        window.crypto.getRandomValues(array);
        return array[0];
      }
      return Math.floor(Date.now() % 4294967295);
    }

    function mulberry32(seed) {
      let t = seed >>> 0;
      return function seededRandom() {
        t += 0x6D2B79F5;
        let r = Math.imul(t ^ (t >>> 15), 1 | t);
        r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
      };
    }

    function randomInt(min, maxInclusive) {
      return Math.floor(state.rng() * (maxInclusive - min + 1)) + min;
    }

    function sampleOne(array) {
      return array[Math.floor(state.rng() * array.length)];
    }

    function shuffle(array) {
      const copy = array.slice();
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(state.rng() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function blankRow() {
      const row = {};
      DATA_COLUMNS.forEach((column) => {
        row[column] = "";
      });
      row.random_seed = state.seed;
      return row;
    }

    function isFullscreenActive() {
      return Boolean(document.fullscreenElement);
    }

    function startSection(sectionType) {
      state.activeSection = {
        section_type: sectionType,
        start: performance.now(),
        fullscreen_maintained: isFullscreenActive(),
        rows: []
      };
    }

    function addSectionRow(values) {
      if (!state.activeSection) {
        throw new Error("No active section for data row.");
      }
      const row = Object.assign(blankRow(), {
        section_type: state.activeSection.section_type,
        action_type: ""
      }, values || {});
      state.activeSection.rows.push(row);
      return row;
    }

    function finishSection(options) {
      if (!state.activeSection) {
        return [];
      }
      const duration = Math.round(performance.now() - state.activeSection.start);
      const rows = state.activeSection.rows;
      rows.forEach((row) => {
        row.fullscreen_maintained = Boolean(state.activeSection.fullscreen_maintained);
        row.time_section = duration;
      });
      if (options && options.deferRows) {
        state.activeSection = null;
        return rows;
      }
      state.allRows.push(...rows);
      state.activeSection = null;
      return rows;
    }

    document.addEventListener("fullscreenchange", () => {
      if (state.activeSection && !document.fullscreenElement) {
        state.activeSection.fullscreen_maintained = false;
      }
    });

    function setKeyHandler(handler) {
      state.currentKeyHandler = handler;
    }

    document.addEventListener("keydown", (event) => {
      if (!state.currentKeyHandler || event.repeat) {
        return;
      }
      const managedCodes = [
        CONFIG.keys.spin_continue,
        CONFIG.keys.sample,
        CONFIG.keys.skip,
        "Enter"
      ];
      if (managedCodes.includes(event.code)) {
        event.preventDefault();
      }
      state.currentKeyHandler(event);
    });

    function wait(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    function waitForAnimationFrame() {
      return new Promise((resolve) => requestAnimationFrame(() => resolve()));

    /**********************************************************************
     * CONDITION CONSTRUCTION
     **********************************************************************/
    function createConditions() {
      const cells = [];
      const domains = ["gain", "loss"];
      domains.forEach((domain) => {
        CONFIG.condition_definitions.intervals.forEach((interval) => {
          CONFIG.condition_definitions.magnitudes.forEach((magnitude) => {
            const outcomes = CONFIG.condition_definitions.non_zero_outcomes[domain][magnitude.id][interval.id];
            cells.push({
              cell_id: `${domain}_nonzero_${interval.id}_${magnitude.id}`,
              domain,
              interval_category: interval.id,
              magnitude_category: magnitude.id,
              minimum_number_condition: "non-zero",
              zero_condition_order: "",
              outcomes: outcomes.slice(),
              starting_amount: domain === "gain" ? 0 : 50,
              cell_order_family: "interval_magnitude"
            });
          });
        });
        CONFIG.condition_definitions.zero_outcomes[domain].forEach((outcomes, index) => {
          const zeroOrder = index + 1;
          cells.push({
            cell_id: `${domain}_zero_order_${zeroOrder}`,
            domain,
            interval_category: "",
            magnitude_category: "",
            minimum_number_condition: "zero",
            zero_condition_order: zeroOrder,
            outcomes: outcomes.slice(),
            starting_amount: domain === "gain" ? 0 : 50,
            cell_order_family: "zero_condition_order"
          });
        });
      });
      return cells;
    }

    function buildMainTrialOrders() {
      state.domainOrder = shuffle(["gain", "loss"]);
      state.domainOrder.forEach((domain, domainIndex) => {
        const domainCells = state.conditions.filter((cell) => cell.domain === domain);
        const pooledTrials = [];
        domainCells.forEach((cell) => {
          for (let rep = 1; rep <= 3; rep += 1) {
            pooledTrials.push({
              cell,
              trial_within_cell: rep,
              domain_block_order: domainIndex + 1
            });
          }
        });
        state.trialsByDomain[domain] = shuffle(pooledTrials);
      });
    }

    /**********************************************************************
     * FORMATTING AND DATA HELPERS
     **********************************************************************/
    function formatStartingAmount(amount) {
      return `$${Math.abs(amount)}`;
    }

    function formatSignedDollar(value) {
      if (value > 0) {
        return `+$${Math.abs(value)}`;
      }
      if (value < 0) {
        return `-$${Math.abs(value)}`;
      }
      return "$0";
    }

    function formatPlainDollar(value) {
      return `$${Math.abs(value)}`;
    }

    function rouletteVerb(value) {
      return value < 0 ? "lost" : "gained";
    }

    function normalizedNumericText(text) {
      return String(text || "")
        .trim()
        .replace(/[$+\-\s]/g, "")
        .replace(",", ".");
    }

    function numericPartMatches(response, target) {
      const cleaned = normalizedNumericText(response);
      if (cleaned === "") {
        return false;
      }
      const responseValue = Number(cleaned);
      const targetValue = Math.abs(Number(target));
      return Number.isFinite(responseValue) && responseValue === targetValue;
    }

    function rouletteBaseData(context) {
      const cell = context.cell;
      return {
        trial_number: context.trial_number,
        cell_id: cell.cell_id,
        trial_within_cell: context.trial_within_cell,
        event_index_within_trial: context.event_index_within_trial,
        domain: cell.domain,
        domain_block_order: context.domain_block_order,
        interval_category: cell.interval_category,
        magnitude_category: cell.magnitude_category,
        minimum_number_condition: cell.minimum_number_condition,
        zero_condition_order: cell.zero_condition_order,
        starting_amount: cell.starting_amount,
        roulette_outcome: context.roulette_outcome,
        roulette_outcome_not_selected: context.roulette_outcome_not_selected,
        tutorial_order: context.tutorial_order || ""
      };
    }

    function addRouletteActionRow(sectionType, actionType, context, extras) {
      context.event_index_within_trial += 1;
      const data = Object.assign(rouletteBaseData(context), {
        event_index_within_trial: context.event_index_within_trial,
        action_type: actionType
      }, extras || {});
      return addSectionRow(data);
    }

    function getNameUsageStore(isTutorial, cellId) {
      const store = isTutorial ? state.tutorialNameUsage : state.mainNameUsage;
      if (!store[cellId]) {
        store[cellId] = {};
        CONFIG.nicknames.forEach((name) => {
          store[cellId][name] = 0;
        });
      }
      return store[cellId];
    }

    function sampleParticipantOutcome(cell, isTutorial) {
      const usage = getNameUsageStore(isTutorial, cell.cell_id);
      const availableNames = CONFIG.nicknames.filter((name) => usage[name] < 3);
      if (availableNames.length === 0) {
        return null;
      }
      const name = sampleOne(availableNames);
      usage[name] += 1;
      const rouletteOutcome = sampleOne(cell.outcomes);
      return {
        name,
        roulette_outcome: rouletteOutcome,
        final_outcome: cell.starting_amount + rouletteOutcome
      };
    }

    function selectTrialVisuals(cell) {
      const paletteNames = Object.keys(CONFIG.colors.roulette_palettes);
      const paletteName = sampleOne(paletteNames);
      const palette = CONFIG.colors.roulette_palettes[paletteName];
      const darkFirst = state.rng() < 0.5;
      const outcomeColors = {};
      outcomeColors[cell.outcomes[0]] = darkFirst ? palette.dark : palette.less_dark;
      outcomeColors[cell.outcomes[1]] = darkFirst ? palette.less_dark : palette.dark;
      const slices = shuffle([
        cell.outcomes[0], cell.outcomes[0], cell.outcomes[0],
        cell.outcomes[1], cell.outcomes[1], cell.outcomes[1]
      ]).map((outcome) => ({
        outcome,
        color: outcomeColors[outcome]
      }));
      return {
        palette_name: paletteName,
        outcome_colors: outcomeColors,
        slices
      };
    }

    function prepareSpinTarget(cell, slices) {
      const selectedOutcome = sampleOne(cell.outcomes);
      const possibleSliceIndexes = slices
        .map((slice, index) => ({ slice, index }))
        .filter((entry) => entry.slice.outcome === selectedOutcome)
        .map((entry) => entry.index);
      const targetSliceIndex = sampleOne(possibleSliceIndexes);
      const notSelected = cell.outcomes.find((value) => value !== selectedOutcome);
      return {
        selected_outcome: selectedOutcome,
        not_selected_outcome: notSelected,
        target_slice_index: targetSliceIndex
      };
    }

    /**********************************************************************
     * ROULETTE DRAWING AND SPINNING
     **********************************************************************/
    function drawWheel(slices) {
      const canvas = document.getElementById("wheelCanvas");
      if (!canvas) {
        return;
      }
      const ctx = canvas.getContext("2d");
      const size = CONFIG.animation.wheel_canvas_size;
      const center = size / 2;
      const radius = CONFIG.animation.wheel_radius;
      const sliceAngle = Math.PI * 2 / slices.length;
      ctx.clearRect(0, 0, size, size);

      slices.forEach((slice, index) => {
        const start = state.wheelAngle + index * sliceAngle;
        const end = start + sliceAngle;
        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, start, end, false);
        ctx.closePath();
        ctx.fillStyle = slice.color;
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.95)";
        ctx.stroke();

        const midpoint = start + sliceAngle / 2;
        drawRadialLabel(ctx, center, midpoint, slice.outcome);
      });

      ctx.beginPath();
      ctx.arc(center, center, radius, 0, Math.PI * 2);
      ctx.lineWidth = 5;
      ctx.strokeStyle = "#2a2f3a";
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(center, center, CONFIG.animation.center_cap_radius, 0, Math.PI * 2);
      ctx.fillStyle = "#f8fafc";
      ctx.fill();
      ctx.lineWidth = 4;
      ctx.strokeStyle = "#2a2f3a";
      ctx.stroke();
    }

    function drawRadialLabel(ctx, center, angle, value) {
      const inner = CONFIG.animation.label_inner_margin;
      const outer = CONFIG.animation.wheel_radius - CONFIG.animation.label_outer_margin;
      const radialSpan = outer - inner;
      const label = formatSignedDollar(value);
      ctx.save();
      ctx.translate(center, center);
      ctx.rotate(angle);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#ffffff";
      ctx.strokeStyle = "rgba(0, 0, 0, 0.35)";
      ctx.lineWidth = 4;
      ctx.font = "800 30px Inter, Segoe UI, sans-serif";
      const x = inner + radialSpan / 2;
      ctx.strokeText(label, x, 0);
      ctx.fillText(label, x, 0);
      ctx.restore();
    }

    function spinWheel(slices, targetSliceIndex) {
      const duration = CONFIG.timings.spin_duration;
      const sliceAngle = Math.PI * 2 / slices.length;
      const pointerAngle = -Math.PI / 2;
      const targetMidpoint = targetSliceIndex * sliceAngle + sliceAngle / 2;
      let targetAngle = pointerAngle - targetMidpoint;
      while (targetAngle > state.wheelAngle) {
        targetAngle -= Math.PI * 2;
      }
      const rotations = randomInt(
        CONFIG.animation.min_counterclockwise_rotations,
        CONFIG.animation.max_counterclockwise_rotations
      );
      while (state.wheelAngle - targetAngle < rotations * Math.PI * 2) {
        targetAngle -= Math.PI * 2;
      }
      const startAngle = state.wheelAngle;
      const delta = targetAngle - startAngle;
      const startTime = performance.now();

      return new Promise((resolve) => {
        function step(now) {
          const progress = Math.min(1, (now - startTime) / duration);
          const eased = 1 - Math.pow(1 - progress, 3);
          state.wheelAngle = startAngle + delta * eased;
          drawWheel(slices);
          if (progress < 1) {
            requestAnimationFrame(step);
          } else {
            state.wheelAngle = targetAngle;
            drawWheel(slices);
            resolve();
          }
        }
        requestAnimationFrame(step);
      });
    }

    /**********************************************************************

     **********************************************************************/
    function setFillProgress(button, progress) {
      const fill = button.querySelector(".button-fill");
      if (fill) {
        fill.style.width = `${Math.max(0, Math.min(1, progress)) * 100}%`;
      }
    }

    function animateButtonFill(button, sectionStart, minimumMs, onReady) {
      let readyCalled = false;
      function frame() {
        const elapsed = performance.now() - sectionStart;
        const progress = minimumMs <= 0 ? 1 : elapsed / minimumMs;
        setFillProgress(button, progress);
        if (progress >= 1) {
          button.setAttribute("aria-disabled", "false");
          button.classList.add("ready");
          if (!readyCalled) {
            readyCalled = true;
            onReady();
          }
          return;
        }
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    async function showProgressiveInstructionPage(options) {
      startSection(options.section_type);
      setKeyHandler(null);
      let revealed = 1;
      let consentChecked = false;
      const blocks = options.blocks;
      setDisplay(`
        <main class="page-shell">
          <section class="instruction-panel">
            <div class="instruction-title">${options.title}</div>
            <div id="instructionContent" class="instruction-content ${options.scrollable ? "scrollable" : ""}"></div>
            <div class="instruction-bottom">
              <button id="instructionButton" class="fill-button ready" aria-disabled="false">
                <span class="button-fill"></span>
                <span class="button-label">NEXT</span>
              </button>
              <div id="instructionFeedback" class="validation-message"></div>
            </div>
          </section>
        </main>
      `);

      const content = document.getElementById("instructionContent");
      const button = document.getElementById("instructionButton");
      const label = button.querySelector(".button-label");
      const feedback = document.getElementById("instructionFeedback");
      let timeReady = false;
      let fillLoopStarted = false;

      function blockHtml(block, index) {
        if (options.consent && index === blocks.length - 1) {
          return `
            <div class="instruction-block">
              <label class="consent-row">
                <input id="consentCheckbox" type="checkbox">
                <span>${escapeHtml(block)}</span>
              </label>
            </div>`;
        }
        if (typeof block === "string") {
          return `<div class="instruction-block"><p>${escapeHtml(block)}</p></div>`;
        }
        return `
          <div class="instruction-block">
            <h3>${escapeHtml(block.title)}</h3>
            ${block.paragraphs.map((paragraph) => `<p>${escapeHtml(paragraph)}</p>`).join("")}
          </div>`;
      }

      function renderBlocks() {
        content.innerHTML = blocks.slice(0, revealed).map(blockHtml).join("");
        const blockNodes = Array.from(content.querySelectorAll(".instruction-block"));
        blockNodes.slice(0, -1).forEach((node) => node.classList.add("dimmed"));
        const checkbox = document.getElementById("consentCheckbox");
        if (checkbox) {
          checkbox.checked = consentChecked;
          checkbox.addEventListener("change", () => {
            consentChecked = checkbox.checked;
            feedback.textContent = "";
            updateFinalButtonState();
          });
        }
        if (options.scrollable) {
          content.scrollTop = content.scrollHeight;
        }
      }

      function allRequirementsMet() {
        return revealed >= blocks.length && timeReady && (!options.consent || consentChecked);
      }

      function updateFinalButtonState() {
        if (revealed < blocks.length) {
          label.textContent = "NEXT";
          button.classList.add("ready");
          button.setAttribute("aria-disabled", "false");
          setFillProgress(button, 0);
          return;
        }
        label.textContent = "NEXT PAGE";
        startProgressiveFillLoop();
        if (allRequirementsMet()) {
          button.classList.add("ready");
          button.setAttribute("aria-disabled", "false");
        } else {
          button.classList.remove("ready");
          button.setAttribute("aria-disabled", "true");
        }
      }

      function startProgressiveFillLoop() {
        if (fillLoopStarted) {
          return;
        }
        fillLoopStarted = true;
        function frame() {
          const elapsed = performance.now() - state.activeSection.start;
          const progress = options.minimum_ms <= 0 ? 1 : elapsed / options.minimum_ms;
          setFillProgress(button, progress);
          if (progress >= 1) {
            timeReady = true;
            updateFinalButtonState();
            return;
          }
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
      }

      renderBlocks();
      setFillProgress(button, 0);
      updateFinalButtonState();

      await new Promise((resolve) => {
        button.addEventListener("click", () => {
          if (revealed < blocks.length) {
            revealed += 1;
            feedback.textContent = "";
            renderBlocks();
            updateFinalButtonState();
            return;
          }
          if (!timeReady) {
            feedback.textContent = "Please spend a little more time on this page.";
            return;
          }
          if (options.consent && !consentChecked) {
            feedback.textContent = "Please tick the consent checkbox to continue.";
            return;
          }
          resolve();
        });
      });

      addSectionRow(options.consent ? { consent_check: true } : {});
      finishSection();
    }

    function runSeeCooldown(skipActive, tutorialMode) {
      setSamplingControls({ skip: skipActive, see: false, waiting: true, waitFill: "0%" });
      const start = performance.now();
      return new Promise((resolve) => {
        function frame(now) {
          const progress = Math.min(1, (now - start) / CONFIG.timings.sampling_cooldown);
          setSamplingControls({ skip: skipActive, see: false, waiting: true, waitFill: `${progress * 100}%` });
          if (progress < 1) {
            requestAnimationFrame(frame);
          } else {
            setSamplingControls({ skip: false, see: true, waiting: false });
            resolve();
          }
        }
        requestAnimationFrame(frame);
      });
    }

    async function waitForSpaceWithOptionalTutorialSampling(context, samples) {
      let cooling = false;
      setSamplingControls({ skip: false, see: true });
      updateBottomIndicator("Press <strong>J</strong> to see more or <strong>SPACE</strong> to change roulette.");
      return new Promise((resolve) => {
        setKeyHandler(async (event) => {
          if (cooling) {
            return;
          }
          if (event.code === CONFIG.keys.sample) {
            cooling = true;
            setKeyHandler(null);
            await doTutorialSample(context, samples);
            cooling = false;
            setSamplingControls({ skip: false, see: true });
            waitForSpaceWithOptionalTutorialSampling(context, samples).then(resolve);
          } else if (event.code === CONFIG.keys.spin_continue) {
            setKeyHandler(null);
            addRouletteActionRow("tutorial", "roulette_change", context, {
              seeking_decision: samples.length > 0 ? "sample" : "skip"

            resolve();
          }
        });
      });
    }

    async function runComprehensionQuestion(question, position) {
      let attempts = 0;
      let selected = "";
      let optionOrder = shuffle(question.options);
      let feedback = "";
      let explanation = "";

      while (true) {
        setDisplay(`
          <main class="page-shell">
            <section class="center-panel">
              <h1 class="title">Answer the Following Questions</h1>
              <p class="body-text">${escapeHtml(question.question)}</p>

                ${optionOrder.map((option) => `
                  <button class="answer-option ${option === selected ? "selected" : ""}" data-option="${escapeHtml(option)}">${escapeHtml(option)}</button>
                `).join("")}
              </div>
              <button id="questionNext" class="primary-button">Next</button>
              <div id="questionFeedback" class="feedback-message ${feedback === "Correct." ? "ok" : ""}">
                ${escapeHtml(feedback)}
                ${explanation ? `<div style="margin-top: 10px; color: #303541; font-weight: 600;">${escapeHtml(explanation)}</div>` : ""}
              </div>
            </section>
          </main>
        `);
        Array.from(document.querySelectorAll(".answer-option")).forEach((button) => {
          button.addEventListener("click", () => {
            selected = button.getAttribute("data-option");
            Array.from(document.querySelectorAll(".answer-option")).forEach((node) => node.classList.remove("selected"));
            button.classList.add("selected");
            const fb = document.getElementById("questionFeedback");
            fb.textContent = "";
            fb.className = "feedback-message";
          });
        });

          document.getElementById("questionNext").addEventListener("click", () => {
            if (!selected) {
              const fb = document.getElementById("questionFeedback");
              fb.textContent = "Please select an answer before continuing.";
              fb.className = "feedback-message";
              return;
            }
            attempts += 1;
            const correct = selected === question.correct;
            addSectionRow({
              question_id: question.id,
              question_order_position: position,
              question_selected_option_text: selected,
              question_answer_correct: correct,
              question_attempts: attempts
            });
            resolve({ correct });
          }, { once: true });
        });

        if (result.correct) {
          return;
        }
        if (attempts >= 2) {
          feedback = "Incorrect.";
          explanation = question.explanation;
          setDisplay(`
            <main class="page-shell">
              <section class="center-panel">
                <h1 class="title">Answer the Following Questions</h1>

          });
          return;
        }
        feedback = "Incorrect. Please try again.";
        explanation = "";
        selected = "";
        optionOrder = shuffle(question.options);
      }
    }

    async function runPostSpinChoice(context, samples) {
      let choiceMade = false;
      let sampledAtLeastOnce = false;
      let skipped = false;
      let cooling = false;
      let canContinue = false;
      let sampleIndex = 0;
      let invalidKeypressCount = 0;

      setSamplingControls({ skip: true, see: true });
      updateBottomIndicator("Press <strong>J</strong> to see another outcome or <strong>F</strong> to skip.");

      await new Promise((resolve) => {
        const refreshControls = () => {
          if (cooling) {
            return;
          }
          const availableNames = CONFIG.nicknames.some((name) => getNameUsageStore(false, context.cell.cell_id)[name] < 3);
          setSamplingControls({
            skip: !choiceMade,
            see: availableNames,
            done: !availableNames
          });
          if (canContinue) {
            updateBottomIndicator("Press <strong>J</strong> to see more or <strong>SPACE</strong> to continue.");
          }
        };

        const handler = async (event) => {
          if (cooling) {
            invalidKeypressCount += 1;
            return;
          }
          if (event.code === CONFIG.keys.sample) {
            const sample = sampleParticipantOutcome(context.cell, false);
            if (!sample) {
              refreshControls();
              return;
            }
            choiceMade = true;
            sampledAtLeastOnce = true;
            canContinue = false;
            cooling = true;
            sampleIndex += 1;
            samples.push(sample);
            updateSampleList(samples);
            addRouletteActionRow("main_task", "sample", context, {
              seeking_decision: "sample",
              sample_index_within_trial: sampleIndex,
              sampled_name: sample.name,
              sampled_roulette_outcome: sample.roulette_outcome,
              sampled_final_outcome: sample.final_outcome
            });
            setSamplingControls({ skip: false, see: false, waiting: true, waitFill: "0%" });
            setKeyHandler(handler);
            const cooldownStart = performance.now();
            await new Promise((cooldownResolve) => {
              function frame(now) {
                const progress = Math.min(1, (now - cooldownStart) / CONFIG.timings.sampling_cooldown);
                setSamplingControls({ skip: false, see: false, waiting: true, waitFill: `${progress * 100}%` });
                if (progress < 1) {
                  requestAnimationFrame(frame);
                } else {
                  cooldownResolve();
                }
              }
              requestAnimationFrame(frame);
            });
            cooling = false;
            canContinue = true;
            refreshControls();
            return;
          }
          if (event.code === CONFIG.keys.skip && !choiceMade) {
            choiceMade = true;
            skipped = true;
            canContinue = true;
            addRouletteActionRow("main_task", "skip", context, {
              seeking_decision: "skip"
            });
            setSamplingControls({ skip: false, see: false });
            updateBottomIndicator("Press <strong>SPACE</strong> to continue.");
            return;
          }
          if (event.code === CONFIG.keys.spin_continue && choiceMade && canContinue) {
            addRouletteActionRow("main_task", "roulette_change", context, {
              seeking_decision: sampledAtLeastOnce ? "sample" : (skipped ? "skip" : "")
            });
            setKeyHandler(null);
            resolve();
            return;
          }
          invalidKeypressCount += 1;
        };
        setKeyHandler(handler);
        refreshControls();
      });
    }

    /**********************************************************************
     * FINAL CONSISTENCY CHECK
     **********************************************************************/
    function internalConsistencyCheck() {
      const allowedSections = new Set([
        "information_sheet",
        "informed_consent",
        "welcome_page",
        "task_description",
        "tutorial",
        "comprehension_check",
        "block_intro",
        "main_task",
        "attention_check",
        "questionnaire",
        "post_questionnaire_transition",
        "debriefing",
        "completion_page"
      ]);
      const allowedActions = new Set(["spin", "sample", "skip", "roulette_change", ""]);
      const rouletteSections = new Set(["tutorial", "main_task"]);
      const bannedColumns = [
        ["event", "type"].join("_"),
        ["is", "tutorial"].join("_"),
        ["fullscreen", "exit", "count"].join("_"),
        ["fullscreen", "exit", "total", "duration"].join("_"),
        ["time", "attention", "check"].join("_")
      ];
      const commonColumns = ["random_seed", "section_type", "action_type", "fullscreen_maintained", "time_section"];
      const rouletteColumns = [
        "trial_number",
        "cell_id",
        "trial_within_cell",
        "event_index_within_trial",
        "domain",
        "domain_block_order",
        "interval_category",
        "magnitude_category",
        "minimum_number_condition",
        "zero_condition_order",
        "starting_amount",
        "roulette_outcome",
        "roulette_outcome_not_selected",
        "seeking_decision",
        "sample_index_within_trial",
        "sampled_name",
        "sampled_roulette_outcome",
        "sampled_final_outcome"
      ];
      const allowedNonEmptyBySection = {
        information_sheet: commonColumns,
        informed_consent: commonColumns.concat(["consent_check"]),
        welcome_page: commonColumns.concat(["participant_id", "participant_first_name"]),
        task_description: commonColumns,
        tutorial: commonColumns.concat(rouletteColumns, ["tutorial_order"]),
        comprehension_check: commonColumns.concat([
          "question_id",
          "question_order_position",
          "question_selected_option_text",
          "question_answer_correct",
          "question_attempts"
        ]),
        block_intro: commonColumns.concat(["domain", "domain_block_order"]),
        main_task: commonColumns.concat(rouletteColumns),
        attention_check: commonColumns.concat([
          "attention_check_bloc",
          "attention_check_received_response",
          "attention_check_other_response",
          "attention_check_received_correct",
          "attention_check_other_correct",
          "attention_check_both_correct"
        ]),
        questionnaire: commonColumns.concat(["ses_ladder_response", "experience_description"]),
        post_questionnaire_transition: commonColumns,
        debriefing: commonColumns,
        completion_page: commonColumns
      };
      const cells = state.conditions;
      bannedColumns.forEach((column) => {
        if (DATA_COLUMNS.includes(column)) {
          throw new Error(`Banned data column present: ${column}`);
        }
      });
      if (cells.length !== 24) {
        throw new Error("Internal consistency check failed: expected 24 cells.");
      }
      const mainTrials = Object.values(state.trialsByDomain).reduce((sum, trials) => sum + trials.length, 0);
      if (mainTrials !== 72) {
        throw new Error("Internal consistency check failed: expected 72 main trials.");
      }
      state.allRows.concat(state.finalCompletionRow ? [state.finalCompletionRow] : []).forEach((row) => {
        if (!allowedSections.has(row.section_type)) {
          throw new Error(`Invalid section_type: ${row.section_type}`);
        }
        if (!allowedActions.has(row.action_type)) {
          throw new Error(`Invalid action_type: ${row.action_type}`);
        }
        if (!rouletteSections.has(row.section_type) && row.action_type !== "") {
          throw new Error("Non-roulette section has a roulette action_type.");
        }
        if (row.participant_id && row.section_type !== "welcome_page") {
          throw new Error("participant_id saved outside welcome_page.");
        }
        if (row.participant_first_name && row.section_type !== "welcome_page") {
          throw new Error("participant_first_name saved outside welcome_page.");
        }
        const allowedForSection = new Set(allowedNonEmptyBySection[row.section_type]);
        DATA_COLUMNS.forEach((column) => {
          if (!allowedForSection.has(column) && row[column] !== "") {
            throw new Error(`Unexpected populated column ${column} in ${row.section_type}.`);
          }
        });
      });
    }

    class RouletteExperimentPlugin {
      constructor(jsPsychInstance) {
        this.jsPsych = jsPsychInstance;
      }

      async trial(displayElement) {
        state.display = displayElement;
        if (jsPsych.data && typeof jsPsych.data.reset === "function") {
          jsPsych.data.reset();
        }
        try {
          state.conditions = createConditions();
          buildMainTrialOrders();
          await showFullscreenEntry();
          await showProgressiveInstructionPage({
            section_type: "information_sheet",
            title: "Information Sheet",
            blocks: CONFIG.texts.information_sheet,
            scrollable: true,
            minimum_ms: CONFIG.timings.information_sheet_minimum_viewing_time
          });
          await showProgressiveInstructionPage({

            blocks: CONFIG.texts.informed_consent,
            consent: true,
            minimum_ms: CONFIG.timings.informed_consent_minimum_viewing_time
          });
          await showWelcomeNamePage();

            section_type: "task_description",
            title: "Description of The Roulette Game",
            blocks: CONFIG.texts.task_description,
            minimum_ms: CONFIG.timings.task_description_minimum_viewing_time
          });
          await runTutorial();
          await runComprehensionCheck();
          await runMainExperiment();
          await runQuestionnairesAndDebriefing();
          internalConsistencyCheck();
          state.allRows.forEach((row) => jsPsych.data.write(row));
          jsPsych.finishTrial(state.finalCompletionRow || Object.assign(blankRow(), {
            section_type: "completion_page",
            fullscreen_maintained: isFullscreenActive(),
            time_section: 0
          }));
        } catch (error) {
          setDisplay(`
            <main class="page-shell">
              <section class="center-panel">
                <h1 class="title">The experiment stopped</h1>
                <p class="body-text">Please contact the researcher and do not refresh this page.</p>

          `);
          const fallbackRow = Object.assign(blankRow(), {
            section_type: "completion_page",
            action_type: "",
            fullscreen_maintained: isFullscreenActive(),
            time_section: 0
          });
          jsPsych.finishTrial(fallbackRow);
        }
      }
    }

    RouletteExperimentPlugin.info = {
      name: "roulette-experiment-app",
      parameters: {}
    };

    async function bootExperiment() {
      const timeline = [];
      if (IS_PAVLOVIA_HOSTED) {
        let pavloviaReady = false;
        try {
          await loadScript(CONFIG.pavlovia_plugin_url);
          if (typeof jsPsychPavlovia !== "undefined") {
            pavloviaReady = true;
            timeline.push({
              type: jsPsychPavlovia,
              command: "init",
              data: Object.assign(blankRow(), {
                section_type: "information_sheet",
                fullscreen_maintained: isFullscreenActive(),
                time_section: 0
              })
            });
          }
        } catch (error) {
          pavloviaReady = false;
        }
        if (!pavloviaReady) {
          state.display = document.getElementById("jspsych-target");
          setDisplay(`
            <main class="page-shell">
              <section class="center-panel">
                <h1 class="title">The experiment cannot start</h1>
                <p class="body-text">The Pavlovia saving component did not load. Please contact the researcher.</p>
              </section>
            </main>
          `);
          return;
        }
      }

      timeline.push({ type: RouletteExperimentPlugin });

      if (IS_PAVLOVIA_HOSTED && typeof jsPsychPavlovia !== "undefined") {
        timeline.push({
          type: jsPsychPavlovia,
          command: "finish",
          data: Object.assign(blankRow(), {
            section_type: "completion_page",
            fullscreen_maintained: isFullscreenActive(),
            time_section: 0
          })
        });
      }

      jsPsych.run(timeline);
    }

    if (JSPSYCH_AVAILABLE) {
      bootExperiment();
    }
  </script>
</body>
</html>
